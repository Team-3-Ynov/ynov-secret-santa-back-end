# Required metadata
sonar.projectKey=ynov-secret-santa-back-end
sonar.projectName=Secret Santa Backend
sonar.projectVersion=1.0

# Comma-separated paths to directories with sources (required)
sonar.sources=src

# Language
sonar.language=ts

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Test files
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts

# Coverage report
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.husky/**,**/.agent/**,**/.github/**

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.husky/**,**/.agent/**,**/.github/**

# Quality profiles
sonar.profile=Sonar way

# Properties for TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Properties for JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Properties for security
sonar.security.reportsPaths=semgrep.json

# Properties for code coverage
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/.husky/**,**/.agent/**,**/.github/**
