# ═══════════════════════════════════════════════════════════════
# GitHub Actions - CI/CD Pipeline for Secret Santa Backend
# ═══════════════════════════════════════════════════════════════
#
# Triggers:
#   - Push to main    → Tests + Build + Deploy Production
#   - Push to develop → Tests + Build + Deploy Staging
#   - Pull Request    → Tests only
#
# ═══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Tests & Lint
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: secret_santa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Security audit
        run: pnpm audit --audit-level=high

      - name: 🔨 Build TypeScript
        run: pnpm build

      - name: 🧹 Lint code
        run: pnpm lint

      - name: 📏 Typecheck
        run: pnpm typecheck

      - name: 🧪 Run tests
        run: pnpm test --coverage
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: secret_santa_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-jwt-secret-for-ci-pipeline
          REFRESH_TOKEN_SECRET: test-refresh-secret-for-ci
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          FRONTEND_URL: http://localhost:3000

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: 🔍 SonarQube Scan
        if: always()
        run: |
          # Install SonarScanner
          dotnet tool install --global dotnet-sonarscanner --version 6.2.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          
          # Run SonarScanner
          sonar-scanner \
            -Dsonar.projectKey=ynov-secret-santa-back-end \
            -Dsonar.sources=src \
            -Dsonar.host.url=${{ secrets.SONARQUBE_URL }} \
            -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }} \
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info

      - name: 📋 Test Summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            echo "✅ Tests completed with coverage report" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No coverage report generated" >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Build & Push Docker Image
  # ═══════════════════════════════════════════════════════════════
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag avec le nom de la branche
            type=ref,event=branch
            # Tag avec le SHA court du commit
            type=sha,prefix=
            # Tag 'latest' pour main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag 'staging' pour develop
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            # Tag 'production' pour main
            type=raw,value=production,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 📝 Image summary
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Deploy to Staging
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: http://staging.example.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Verify SSH Secret exists
        run: |
          echo "### 🔐 Secrets Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "⚠️ SSH_PRIVATE_KEY secret is NOT set" >> $GITHUB_STEP_SUMMARY
            echo "::warning::SSH_PRIVATE_KEY secret is not configured. Add it for real deployment."
          else
            echo "✅ SSH_PRIVATE_KEY secret is configured" >> $GITHUB_STEP_SUMMARY
            echo "🔐 Key preview (first 50 chars): $(echo '${{ secrets.SSH_PRIVATE_KEY }}' | head -c 50)..."
          fi

      - name: 🔑 Verify deployment secrets
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Secrets Status:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # SERVER_HOST
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "- ❌ SERVER_HOST: NOT SET" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ SERVER_HOST: ${{ secrets.SERVER_HOST }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # SERVER_USER
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "- ❌ SERVER_USER: NOT SET" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ SERVER_USER: ${{ secrets.SERVER_USER }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # DB_PASSWORD
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "- ❌ DB_PASSWORD: NOT SET" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ DB_PASSWORD: ***CONFIGURED***" >> $GITHUB_STEP_SUMMARY
          fi
          
          # JWT_SECRET
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "- ❌ JWT_SECRET: NOT SET" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ JWT_SECRET: ***CONFIGURED***" >> $GITHUB_STEP_SUMMARY
          fi

      # ═══════════════════════════════════════════════════════════════
      # DEPLOYMENT - Commentez
      # ═══════════════════════════════════════════════════════════════
      # - name: 🚀 Deploy to staging server
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       cd /opt/secret-santa
      #
      #       # Pull latest images
      #       docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
      #
      #       # Restart services
      #       docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
      #
      #       # Cleanup old images
      #       docker image prune -f
      #
      #       # Health check
      #       sleep 10
      #       curl -f http://localhost/health || exit 1

      - name: ✅ Staging deployment simulation
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Simulation completed (no VPS configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commands that would run:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd /opt/secret-santa" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.staging.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "🎉 Staging deployment simulation completed!"
          echo "   Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging"

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Deploy to Production
  # ═══════════════════════════════════════════════════════════════
