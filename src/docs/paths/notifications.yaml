# ═══════════════════════════════════════════════════════════════
# Notifications Endpoints
# ═══════════════════════════════════════════════════════════════

/api/notifications:
  get:
    tags:
      - Notifications
    summary: Lister les notifications de l'utilisateur
    operationId: getNotifications
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Notifications récupérées
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/NotificationListResponse"
      "401":
        description: Non authentifié
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "500":
        description: Erreur serveur
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"

/api/notifications/unread-count:
  get:
    tags:
      - Notifications
    summary: Récupérer le nombre de notifications non lues
    operationId: getUnreadNotificationsCount
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Nombre récupéré
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/UnreadCountResponse"
      "401":
        description: Non authentifié
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "500":
        description: Erreur serveur
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"

/api/notifications/{id}/read:
  patch:
    tags:
      - Notifications
    summary: Marquer une notification comme lue
    operationId: markNotificationRead
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Notification mise à jour
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  $ref: "../openapi.yaml#/components/schemas/Notification"
      "401":
        description: Non authentifié
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "404":
        description: Notification introuvable
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "500":
        description: Erreur serveur
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"

/api/notifications/read-all:
  patch:
    tags:
      - Notifications
    summary: Marquer toutes les notifications comme lues
    operationId: markAllNotificationsRead
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Notifications mises a jour
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: 3 notification(s) marquee(s) comme lue(s).
                updatedCount:
                  type: integer
                  example: 3
      "401":
        description: Non authentifie
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "500":
        description: Erreur serveur
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"

