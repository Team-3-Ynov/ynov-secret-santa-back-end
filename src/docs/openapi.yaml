# ═══════════════════════════════════════════════════════════════
# OpenAPI 3.0 Specification - Secret Santa API
# ═══════════════════════════════════════════════════════════════

openapi: 3.0.0
info:
  title: Secret Santa API
  version: 1.0.0
  description: API pour gérer les échanges de cadeaux Secret Santa 🎅
  contact:
    name: Support API
servers:
  - url: http://localhost:3000
    description: Serveur de développement
  - url: http://localhost
    description: Serveur Docker (via Nginx)
tags:
  - name: Health
    description: Vérification de l'état de l'API
  - name: Auth
    description: Authentification et gestion des comptes
  - name: Events
    description: Gestion des événements Secret Santa
  - name: Users
    description: Gestion du profil utilisateur
  - name: Notifications
    description: Gestion des notifications
paths:
  /health:
    get:
      tags:
        - Health
      summary: Vérifier l'état de l'API
      description: Retourne l'état de santé de l'API et des services dépendants
      responses:
        '200':
          description: API opérationnelle
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    example: connected
                  environment:
                    type: string
                    example: production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Entrez votre token JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          description: ID unique de l'utilisateur
        email:
          type: string
          format: email
          description: Adresse email de l'utilisateur
        username:
          type: string
          description: Nom d'utilisateur
        created_at:
          type: string
          format: date-time
          description: Date de création du compte
        updated_at:
          type: string
          format: date-time
          description: Date de dernière mise à jour
    Event:
      type: object
      properties:
        id:
          type: string
          description: ID unique de l'événement
        title:
          type: string
          description: Titre de l'événement
        description:
          type: string
          description: Description de l'événement
        eventDate:
          type: string
          format: date-time
          description: Date de l'événement
        budget:
          type: number
          description: Budget par personne
        createdAt:
          type: string
          format: date-time
          description: Date de création de l'événement
        updatedAt:
          type: string
          format: date-time
          description: Date de dernière mise à jour
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Compte créé avec succès
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              description: Token JWT pour l'authentification
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Erreur de validation
