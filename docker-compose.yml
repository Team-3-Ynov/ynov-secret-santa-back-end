# ═══════════════════════════════════════════════════════════════
# Docker Compose
# ═══════════════════════════════════════════════════════════════
#
# Using profiles to handle different environments
# docker compose -f docker-compose.yml --profile all up   # all services
# docker compose -f docker-compose.yml --profile infra up # infra services

include:
  - path: ../ynov-secret-santa-front-end/docker-compose.yml
    # Optional: Include root env if needed, or rely on defaults/local .env
    # env_file: ../.env

services:
  # ═══════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy
  # ═══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: secret_santa_nginx
    profiles: [all]
    ports:
      - "${NGINX_PORT:-80}:80"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NGINX_ENVSUBST_FILTER=NODE_ENV
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/nginx-health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - frontend-backend

  # ═══════════════════════════════════════════════════════════════
  # Backend Express API
  # ═══════════════════════════════════════════════════════════════
  backend:
    # image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-team-3-ynov}/ynov-secret-santa-back-end:${IMAGE_TAG:-staging}
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: secret_santa_backend
    profiles: [all]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-secret_santa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost}
      - SMTP_HOST=mailhog
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-"Secret Santa <noreply@secretsanta.com>"}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend-backend
      - backend-database
      - backend-mailhog

  # ═══════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: secret_santa_db
    profiles: [all, infra]
    environment:
      - POSTGRES_DB=${DB_NAME:-secret_santa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-secret_santa}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT_MAPPING:-5432}"
    networks:
      - backend-database

  # ═══════════════════════════════════════════════════════════════
  # Mailhog SMTP Server
  # ═══════════════════════════════════════════════════════════════
  mailhog:
    image: mailhog/mailhog
    container_name: secret_santa_mailhog
    profiles: [all, infra]
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI
    networks:
      - backend-mailhog

networks:
  frontend-backend:
    driver: bridge
  backend-database:
    driver: bridge
  backend-mailhog:
    driver: bridge

volumes:
  postgres_data:
    driver: local
