version: '3.8'

# ═══════════════════════════════════════════════════════════════
# Docker Compose - Secret Santa Application
# ═══════════════════════════════════════════════════════════════
# Usage:
#   Staging:    docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   Production: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy
  # ═══════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: secret_santa_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  # ═══════════════════════════════════════════════════════════════
  # Backend Express API
  # ═══════════════════════════════════════════════════════════════
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/secret-santa-backend:${IMAGE_TAG:-latest}
    container_name: secret_santa_backend
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-secret_santa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network
    # Port NON exposé publiquement - accessible uniquement via nginx

  # ═══════════════════════════════════════════════════════════════
  # Frontend Next.js
  # ═══════════════════════════════════════════════════════════════
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/secret-santa-frontend:${IMAGE_TAG:-latest}
    container_name: secret_santa_frontend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network
    # Port NON exposé publiquement - accessible uniquement via nginx

  # ═══════════════════════════════════════════════════════════════
  # PostgreSQL Database
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: secret_santa_db
    environment:
      - POSTGRES_DB=${DB_NAME:-secret_santa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-secret_santa}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    # Port NON exposé publiquement - sécurité: seul le backend peut y accéder

# ═══════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════
networks:
  app-network:
    driver: bridge

  mailhog:
    image: mailhog/mailhog
    container_name: secret_santa_mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI

volumes:
  postgres_data:
    driver: local
